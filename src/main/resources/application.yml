spring:
  application:
    name: performance-log

  datasource:
    url: jdbc:mysql://localhost:3306/performance_log?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: # application-local.yml 에서 오버라이드
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
